server {
    listen 80;
    server_name dcash.dtasc.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dcash.dtasc.com.br;

    ssl_certificate /etc/letsencrypt/live/dcash.dtasc.com.br/fullchain.pem
    ssl_certificate_key /etc/nginx/certs/live/dcash.dtasc.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. BACKEND (Prioridade para rotas que começam com /api)
    location ^~ /api {
        proxy_pass http://127.0.0.1:3001; # SEM barra no final
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # 2. MARKET-SERVICE
    location /api/market {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. FRONTEND (Coringa: o que não for /api, cai aqui)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
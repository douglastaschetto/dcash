server {
    listen 80;
    server_name api.dcash.dtasc.com.br;

    # Configurações de logs para facilitar o debug se algo falhar
    access_log /var/log/nginx/dcash_api_access.log;
    error_log /var/log/nginx/dcash_api_error.log;

    location / {
        # 'backend-dcash' deve ser o nome do serviço no seu docker-compose.yml
        proxy_pass http://backend-dcash:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ajuste de Timeout para requisições longas
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }
}